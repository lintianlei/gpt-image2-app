name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          # Install required SDK components for Capacitor
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "cmdline-tools;latest" 2>&1 || echo "SDK components may already be installed"

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: |
          rm -rf android 2>/dev/null || true
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          echo "Java version: $(java -version 2>&1)"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo "sdkmanager: $(which sdkmanager || echo 'not found')"
          ls -la node_modules/.bin/cap* 2>/dev/null
          ./node_modules/.bin/cap add android 2>&1

      - name: Sync Capacitor
        run: |
          ls -la android/ 2>/dev/null || echo "No android dir"
          ./node_modules/.bin/cap sync android 2>&1

      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpt-image2-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Release APK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: GPT IMAGE2 v1.0.0 (Build ${{ github.run_number }})
          files: android/app/build/outputs/apk/debug/app-debug.apk
